# ── Supabase ─────────────────────────────────────────────────────────────────
SUPABASE_URL = "https://YOUR_PROJECT.supabase.co"
SUPABASE_KEY = "your-anon-public-key"

# ── SMTP — for OTP verification emails ───────────────────────────────────────
# Option A: Brevo (recommended — 300 free emails/day)
#   Dashboard → SMTP & API → SMTP tab → copy host/port/login/key
SMTP_HOST = "smtp-relay.brevo.com"
SMTP_PORT = "587"
SMTP_USER = "your-brevo-login@email.com"   # Brevo login email
SMTP_PASS = "your-brevo-smtp-key"          # Brevo SMTP key (not your password)
SMTP_FROM = "noreply@pvmath.com"           # must be a verified sender in Brevo

# Option B: Gmail — uncomment and fill in (Brevo is better for production)
# SMTP_HOST = "smtp.gmail.com"
# SMTP_PORT = "587"
# SMTP_USER = "your@gmail.com"
# SMTP_PASS = "xxxx xxxx xxxx xxxx"        # Gmail App Password (not your Google password)
# SMTP_FROM = "your@gmail.com"
