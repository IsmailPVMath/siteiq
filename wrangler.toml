name = "pvmath-react"
compatibility_date = "2026-06-25"
pages_build_output_dir = "frontend/dist"

# For Cloudflare Pages Git integration:
# Build command: cd frontend && npm ci && npm run build
# Build output directory: frontend/dist
# Production environment variable: VITE_API_URL=https://api.pvmath.com
#
# Custom domain (replace Streamlit at siteiq.pvmath.com):
# Cloudflare Pages → pvmath-react → Custom domains → add siteiq.pvmath.com
# Then update Namecheap DNS: CNAME siteiq → pvmath-react.pages.dev (or CF auto target)
# Remove or repoint the old Railway CNAME when ready to cut over.
